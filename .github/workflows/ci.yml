name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # TODO: commit a package-lock.json and switch to `npm ci` for reproducible
      # installs (needs a machine with Node to generate the lockfile).
      - run: npm install
      - run: npm run lint
      - run: npm test
