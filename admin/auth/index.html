<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PV Casa | Acesso administrativo</title>
  <link href="../../img/favicon.ico" rel="icon">
  <link href="../css/auth.css" rel="stylesheet">
</head>

<body>
  <main class="login-card">
    <img src="../../img/logo2.png" alt="PV Casa" class="login-logo" width="100" height="100">
    <h1>Painel administrativo</h1>

    <form id="login-form" novalidate>
      <div class="input-field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" required>
      </div>

      <div class="input-field">
        <label for="password">Senha</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>

      <button id="login-btn" type="submit" class="btn">Entrar</button>

      <p id="login-error" class="form-message" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module" src="../js/auth.js"></script>
</body>
</html>
