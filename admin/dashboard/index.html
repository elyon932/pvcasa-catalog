<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PV Casa | Painel administrativo</title>
  <link href="../../img/favicon.ico" rel="icon">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="admin-header">
    <div class="header-container">
      <div class="admin-logo">
        <img src="../../img/logo.png" alt="" width="50" height="50">
        <div class="logo-info">
          <h1>PV Casa</h1>
          <span>Painel administrativo</span>
        </div>
      </div>

      <div class="header-actions">
        <div class="search-box">
          <label class="visually-hidden" for="dashboardSearch">Pesquisar no catálogo</label>
          <input type="search" id="dashboardSearch" placeholder="Pesquisar no catálogo...">
        </div>
        <button type="button" id="btnImport" class="btn-ghost">Importar CSV</button>
        <button type="button" id="btnLogout" class="btn-ghost">Sair</button>
        <input type="file" id="csvFile" accept=".csv,text/csv" hidden>
      </div>
    </div>
  </header>

  <p id="importStatus" class="import-status" role="status" aria-live="polite" hidden></p>

  <div class="main-layout">
    <aside class="form-sidebar">
      <div class="form-card">
        <h2 id="formTitle">Criar produto</h2>

        <form id="productForm">
          <input type="hidden" id="productId">

          <div class="field-group">
            <label for="name">Nome do produto</label>
            <input type="text" id="name" required maxlength="180" placeholder="Ex: Jogo de cama percal 400 fios">
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="barcode">Código de barras</label>
              <input type="text" id="barcode" inputmode="numeric" maxlength="14" placeholder="Opcional">
            </div>

            <div class="field-group">
              <label for="category">Categoria</label>
              <select id="category" required>
                <option value="cama">Cama</option>
                <option value="mesa">Mesa</option>
                <option value="banho">Banho</option>
                <option value="decoracao">Decoração</option>
              </select>
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="basePrice">Preço base (R$)</label>
              <input type="text" id="basePrice" inputmode="numeric" required placeholder="0,00">
            </div>
            <div class="field-group">
              <label for="discount">Desconto (%)</label>
              <input type="text" id="discount" inputmode="numeric" value="0">
            </div>
          </div>

          <div class="field-group">
            <label for="stock">Estoque</label>
            <input type="number" id="stock" min="0" step="1" value="0" required>
          </div>

          <p class="price-preview" id="pricePreview">Preço final: <strong>R$ 0,00</strong></p>

          <div class="field-group">
            <span class="field-label">Imagens do produto</span>
            <div class="file-input-wrapper">
              <input type="file" id="imageFiles" multiple accept="image/*" aria-label="Adicionar fotos do produto">
              <span class="file-custom-btn">Adicionar fotos</span>
            </div>
            <div id="uploadPreviewContainer" class="upload-preview-grid" hidden></div>
          </div>

          <div class="progress-container">
            <div id="uploadProgress" class="progress-bar"></div>
          </div>

          <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>

          <button type="submit" id="btnSubmit" class="btn-primary">Registrar produto</button>
          <button type="button" id="btnCancel" class="btn-secondary" hidden>Cancelar</button>
        </form>
      </div>
    </aside>

    <main class="gallery-section">
      <div class="grid-header">
        <h2>Produtos no catálogo</h2>
        <span id="productCount" role="status" aria-live="polite">0 itens</span>
      </div>
      <div class="products-grid" id="adminProductContainer"></div>
      <p id="emptyState" class="empty-state" hidden>Nenhum produto encontrado.</p>
    </main>
  </div>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
