<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Casa | Cama, Mesa e Banho</title>
  <meta name="description" content="Catálogo PV Casa: cama, mesa, banho e decoração com conforto e qualidade. Consulte disponibilidade pelo WhatsApp.">
  <meta property="og:title" content="PV Casa | Cama, Mesa e Banho">
  <meta property="og:description" content="Catálogo de cama, mesa, banho e decoração.">
  <meta property="og:type" content="website">
  <link href="/img/favicon.ico" rel="icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/client/css/style.css">
</head>
<body>
  <a class="skip-link" href="#catalog">Ir para o catálogo</a>

  <header class="main-header">
    <div class="header-inner">
      <div class="logo-area">
        <img src="/img/logo.png" alt="" class="header-logo" width="56" height="56">
        <span class="logo-text">PV Casa</span>
      </div>

      <form class="search-area" id="searchForm" role="search">
        <label class="visually-hidden" for="searchInput">Buscar produtos</label>
        <div class="search-bar">
          <input type="search" id="searchInput" placeholder="O que você procura para sua casa hoje?" autocomplete="off">
          <button type="submit" aria-label="Buscar">Buscar</button>
        </div>
      </form>
    </div>
  </header>

  <div class="layout-container">
    <button type="button" class="filters-toggle" id="filtersToggle" aria-expanded="false" aria-controls="filters">
      Filtros
    </button>

    <aside class="sidebar" id="filters">
      <form id="filtersForm">
        <fieldset class="filter-group">
          <legend>Categorias</legend>
          <label><input type="checkbox" name="category" value="cama"> Cama</label>
          <label><input type="checkbox" name="category" value="mesa"> Mesa</label>
          <label><input type="checkbox" name="category" value="banho"> Banho</label>
          <label><input type="checkbox" name="category" value="decoracao"> Decoração</label>
        </fieldset>

        <fieldset class="filter-group">
          <legend>Preço</legend>
          <label><input type="radio" name="price" value="all" checked> Todos</label>
          <label><input type="radio" name="price" value="low"> Até R$ 50,00</label>
          <label><input type="radio" name="price" value="mid"> R$ 50,00 a R$ 150,00</label>
          <label><input type="radio" name="price" value="high"> Acima de R$ 150,00</label>
        </fieldset>

        <div class="filter-group">
          <label for="sortSelect">Ordenar por</label>
          <select id="sortSelect">
            <option value="name">Nome (A-Z)</option>
            <option value="price-asc">Menor preço</option>
            <option value="price-desc">Maior preço</option>
            <option value="discount">Maior desconto</option>
          </select>
        </div>

        <button type="button" class="btn-clear" id="btnClearFilters">Limpar filtros</button>
      </form>
    </aside>

    <main class="content-area" id="catalog">
      <p class="results-count" id="resultsCount" role="status" aria-live="polite"></p>

      <div class="products-grid" id="productContainer"></div>

      <p class="state-message" id="stateMessage" hidden></p>

      <div class="load-more-container">
        <button type="button" id="btnLoadMore" hidden>Carregar mais produtos</button>
      </div>
    </main>
  </div>

  <footer class="main-footer">
    <p class="footer-brand">PV Casa</p>
    <p>Cama, mesa e banho com conforto e qualidade.</p>
    <p class="footer-copy">&copy; <span id="footerYear"></span> PV Casa. Todos os direitos reservados.</p>
  </footer>

  <script type="module" src="/client/js/catalog.js"></script>
</body>
</html>
